name: Build Windows exe

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Build exe
        run: pyinstaller --noconfirm CodexLimitsOverlay.spec

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/CodexLimitsOverlay/* -DestinationPath CodexLimitsOverlay-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexLimitsOverlay-windows
          path: CodexLimitsOverlay-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CodexLimitsOverlay-windows.zip
